<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả bài thi - ThiTracNghiem</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .kq-wrap { max-width: 960px; margin: 0 auto; }
        .kq-title { font-size: 1.45rem; font-weight: 700; color: #2d3748; margin: 0 0 8px; }
        .kq-meta { font-size: 0.88rem; color: #718096; margin: 0 0 22px; }
        .kq-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 22px; }
        @media (max-width: 720px) { .kq-cards { grid-template-columns: 1fr; } }
        .kq-card {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .kq-card .lab { font-size: 0.78rem; color: #718096; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
        .kq-card .val { font-size: 1.35rem; font-weight: 700; color: #3182ce; }
        .kq-card .sub { font-size: 0.82rem; color: #a0aec0; margin-top: 4px; }
        .kq-grid-wrap {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px;
            margin-bottom: 20px;
        }
        .kq-grid-wrap h3 { margin: 0 0 14px; font-size: 0.95rem; color: #4a5568; }
        .kq-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; max-width: 100%;
        }
        .kq-o {
            display: flex; align-items: center; justify-content: center; aspect-ratio: 1; border-radius: 8px;
            font-size: 0.78rem; font-weight: 600; text-decoration: none; color: #fff;
        }
        .kq-o.dung { background: #38a169; }
        .kq-o.sai { background: #e53e3e; }
        .kq-legend { margin-top: 14px; font-size: 0.82rem; color: #718096; }
        .kq-actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 24px; }
        .btn-thoat {
            display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 10px;
            border: none; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.9rem;
            background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
        }
        .btn-thoat:hover { opacity: 0.92; }
        .link-chi-tiet { color: #3182ce; font-weight: 500; font-size: 0.9rem; }
    </style>
</head>
<body th:attr="data-thi-an-danh=${thiAnDanh}">
    <input type="hidden" id="phienThiIdHidden" th:value="${phienThiId}">

    <aside class="sidebar" id="sidebar" th:unless="${thiAnDanh}">
        <div class="sidebar-header">
            <a th:href="@{/}" class="sidebar-logo">
                <i class="fas fa-graduation-cap"></i>
                <span>ThiTracNghiem</span>
            </a>
            <button type="button" class="sidebar-close" id="sidebarClose" aria-label="Đóng menu">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="sidebar-menu">
            <div class="menu-section">
                <span class="menu-label">MENU CHÍNH</span>
                <a th:href="@{/dashboard/sinh-vien}" class="menu-item active">
                    <i class="fas fa-home"></i>
                    <span>Trang Chủ</span>
                </a>
                <a th:href="@{/dashboard/sinh-vien/lich-su-thi}" class="menu-item">
                    <i class="fas fa-file-alt"></i>
                    <span>Lịch Sử Thi</span>
                </a>
                <a th:href="@{/dashboard/sinh-vien/phong-thi}" class="menu-item">
                    <i class="fas fa-door-open"></i>
                    <span>Lớp/Phòng Thi</span>
                </a>
            </div>
            <div class="menu-section">
                <span class="menu-label">TÀI KHOẢN</span>
                <a th:href="@{/dashboard/sinh-vien/ho-so}" class="menu-item">
                    <i class="fas fa-user"></i>
                    <span>Hồ Sơ</span>
                </a>
                <a href="#" class="menu-item logout-btn" id="btnLogout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng Xuất</span>
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <div class="header-left">
                <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Mở menu" th:if="${!thiAnDanh}">
                    <i class="fas fa-bars"></i>
                </button>
                <h1><i class="fas fa-poll" style="color:#667eea;margin-right:10px;"></i>Kết quả bài thi</h1>
            </div>
            <div class="header-right" th:unless="${thiAnDanh}">
                <div class="user-info" id="userInfo">
                    <div class="user-info-text">
                        <span class="user-name">Xin chào, <strong id="displayName">—</strong></span>
                        <span class="user-role-badge" id="displayRole">Sinh viên</span>
                    </div>
                    <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                </div>
            </div>
            <div class="header-right" th:if="${thiAnDanh}" style="font-size:0.88rem;color:#718096;">
                <span>Phiên thi ẩn danh</span>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="kq-wrap" id="kqRoot">
                <p style="color:#718096;">Đang tải kết quả…</p>
            </div>
        </div>
    </main>

    <script th:src="@{/js/sinh-vien-ket-qua-thi.js}"></script>
</body>
</html>
