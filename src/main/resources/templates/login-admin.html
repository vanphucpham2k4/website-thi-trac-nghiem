<!DOCTYPE html>
<!--
    Trang ĐĂNG NHẬP ADMIN cho website thi trắc nghiệm
    Giao diện riêng dành cho tài khoản Quản trị viên
    Sử dụng Thymeleaf để render dữ liệu động từ Spring Boot
-->
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Admin - Hệ Thống Thi Trắc Nghiệm</title>
    <!-- CSS riêng cho trang admin login -->
    <link rel="stylesheet" th:href="@{/css/login-admin.css}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-login-wrapper">
        <!-- Phần bên trái - Panel điều khiển -->
        <div class="admin-panel">
            <div class="admin-panel-content">
                <!-- Logo -->
                <div class="admin-logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>ThiTracNghiem<span class="admin-tag">Admin</span></span>
                </div>
                <!-- Tiêu đề -->
                <h1>Trang Quản Trị</h1>
                <p>Đăng nhập để truy cập bảng điều khiển quản trị hệ thống thi trắc nghiệm.</p>
                <!-- Thống kê nhanh -->
                <div class="admin-quick-stats">
                    <div class="stat-item">
                        <i class="fas fa-users"></i>
                        <div>
                            <span class="stat-value">1,250+</span>
                            <span class="stat-label">Người dùng</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-file-alt"></i>
                        <div>
                            <span class="stat-value">320+</span>
                            <span class="stat-label">Đề thi</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-question-circle"></i>
                        <div>
                            <span class="stat-value">8,400+</span>
                            <span class="stat-label">Câu hỏi</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-clipboard-check"></i>
                        <div>
                            <span class="stat-value">15,600+</span>
                            <span class="stat-label">Lượt thi</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Phần bên phải - Form đăng nhập -->
        <div class="admin-form-side">
            <div class="admin-form-wrapper">
                <div class="form-header">
                    <div class="admin-badge">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h2>Đăng Nhập Admin</h2>
                    <p>Nhập thông tin tài khoản quản trị của bạn</p>
                </div>

                <!-- Form đăng nhập -->
                <form id="adminLoginForm" class="admin-form">
                    <!-- Tài khoản -->
                    <div class="form-group">
                        <label for="taiKhoan">
                            <i class="fas fa-user"></i> Tài Khoản
                        </label>
                        <input
                            type="text"
                            id="taiKhoan"
                            name="taiKhoan"
                            placeholder="Nhập email hoặc số điện thoại"
                            required
                            autocomplete="username"
                        >
                        <small class="field-message"></small>
                    </div>

                    <!-- Mật khẩu -->
                    <div class="form-group">
                        <label for="matKhau">
                            <i class="fas fa-lock"></i> Mật Khẩu
                        </label>
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="matKhau"
                                name="matKhau"
                                placeholder="Nhập mật khẩu"
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" aria-label="Hiện/Ẩn mật khẩu">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small class="field-message"></small>
                    </div>

                    <!-- CAPTCHA -->
                    <div class="form-group captcha-group">
                        <label>
                            <i class="fas fa-calculator"></i> Xác Minh CAPTCHA
                        </label>
                        <div class="captcha-container">
                            <div class="captcha-question" id="captchaQuestion">
                                <span class="loading-text">Đang tải CAPTCHA...</span>
                            </div>
                            <input
                                type="number"
                                id="captchaAnswer"
                                name="captchaAnswer"
                                placeholder="Kết quả"
                                required
                                min="0"
                            >
                            <button type="button" class="btn-refresh-captcha" id="btnRefreshCaptcha" title="Làm mới CAPTCHA">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                        <input type="hidden" id="captchaId" name="captchaId">
                        <small class="field-message captcha-message"></small>
                    </div>

                    <!-- Nút đăng nhập -->
                    <button type="submit" class="btn-submit" id="btnLogin">
                        <span class="btn-text">
                            <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                        </span>
                        <span class="btn-loader">
                            <i class="fas fa-spinner fa-spin"></i>
                            Đang xử lý...
                        </span>
                    </button>
                </form>

                <!-- Thông báo -->
                <div id="messageBox" class="message-box" style="display: none;">
                    <div class="message-content">
                        <i class="message-icon"></i>
                        <span class="message-text"></span>
                    </div>
                </div>

                <!-- Quay về trang thường -->
                <div class="back-to-user">
                    <a th:href="@{/login}">
                        <i class="fas fa-arrow-left"></i> Quay về đăng nhập người dùng
                    </a>
                </div>
                <div class="back-home">
                    <a th:href="@{/}">
                        <i class="fas fa-home"></i> Quay về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript xử lý form đăng nhập admin -->
    <script th:src="@{/js/login-admin.js}"></script>
</body>
</html>
