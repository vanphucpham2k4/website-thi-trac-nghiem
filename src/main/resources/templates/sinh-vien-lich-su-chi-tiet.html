<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem lại bài thi - ThiTracNghiem</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .ct-head { margin-bottom: 18px; }
        .ct-title { font-size: 1.25rem; font-weight: 700; color: #2d3748; margin: 0 0 6px; }
        .ct-meta { font-size: 0.88rem; color: #718096; margin: 0; }
        .cau-block {
            border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px 18px; margin-bottom: 14px;
            scroll-margin-top: 100px; background: #fff;
        }
        .cau-block.dung { border-left: 4px solid #38a169; }
        .cau-block.sai { border-left: 4px solid #e53e3e; }
        .cau-block .stt { font-weight: 700; color: #3182ce; margin-bottom: 8px; }
        .cau-block .noi-dung { color: #2d3748; line-height: 1.6; margin-bottom: 12px; white-space: pre-wrap; }
        .dap-line { font-size: 0.88rem; margin: 4px 0; color: #4a5568; }
        .dap-line strong { color: #2d3748; }
        .badge-ok { color: #276749; font-weight: 600; }
        .badge-bad { color: #c53030; font-weight: 600; }
        .btn-quay-lai {
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 18px; padding: 10px 18px;
            border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; color: #4a5568; font-family: inherit;
            font-weight: 500; cursor: pointer; text-decoration: none; font-size: 0.88rem;
        }
        .btn-quay-lai:hover { border-color: #cbd5e0; background: #f8fafc; }
    </style>
</head>
<body th:attr="data-thi-an-danh=${thiAnDanh}">
    <input type="hidden" id="phienThiIdHidden" th:value="${phienThiId}">

    <aside class="sidebar" id="sidebar" th:unless="${thiAnDanh}">
        <div class="sidebar-header">
            <a th:href="@{/}" class="sidebar-logo">
                <i class="fas fa-graduation-cap"></i>
                <span>ThiTracNghiem</span>
            </a>
            <button type="button" class="sidebar-close" id="sidebarClose" aria-label="Đóng menu">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="sidebar-menu">
            <div class="menu-section">
                <span class="menu-label">MENU CHÍNH</span>
                <a th:href="@{/dashboard/sinh-vien}" class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>Trang Chủ</span>
                </a>
                <a th:href="@{/dashboard/sinh-vien/lich-su-thi}" class="menu-item active">
                    <i class="fas fa-file-alt"></i>
                    <span>Lịch Sử Thi</span>
                </a>
                <a th:href="@{/dashboard/sinh-vien/phong-thi}" class="menu-item">
                    <i class="fas fa-door-open"></i>
                    <span>Lớp/Phòng Thi</span>
                </a>
                <a th:href="@{/dashboard/sinh-vien/doi-thuong}" class="menu-item">
                    <i class="fas fa-gift"></i>
                    <span>Đổi Thưởng</span>
                </a>
            </div>
            <div class="menu-section">
                <span class="menu-label">TÀI KHOẢN</span>
                <a th:href="@{/dashboard/sinh-vien/ho-so}" class="menu-item">
                    <i class="fas fa-user"></i>
                    <span>Hồ Sơ</span>
                </a>
                <a href="#" class="menu-item logout-btn" id="btnLogout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng Xuất</span>
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <div class="header-left">
                <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Mở menu" th:if="${!thiAnDanh}">
                    <i class="fas fa-bars"></i>
                </button>
                <h1><i class="fas fa-search" style="color:#667eea;margin-right:10px;"></i>Xem lại bài thi</h1>
            </div>
            <div class="header-right" th:unless="${thiAnDanh}">
                <div class="user-info" id="userInfo">
                    <div class="user-info-text">
                        <span class="user-name">Xin chào, <strong id="displayName">—</strong></span>
                        <span class="user-role-badge" id="displayRole">Sinh viên</span>
                    </div>
                    <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                </div>
            </div>
            <div class="header-right" th:if="${thiAnDanh}" style="font-size:0.88rem;color:#718096;">
                <span>Phiên ẩn danh</span>
            </div>
        </header>

        <div class="dashboard-content">
            <a class="btn-quay-lai" th:unless="${thiAnDanh}" th:href="@{/dashboard/sinh-vien/lich-su-thi}"><i class="fas fa-arrow-left"></i> Lịch sử thi</a>
            <a class="btn-quay-lai" th:if="${thiAnDanh}" th:href="@{/thi-mo/ket-qua/{id}(id=${phienThiId})}"><i class="fas fa-arrow-left"></i> Kết quả bài thi</a>
            <div id="chiTietRoot">
                <p style="color:#718096;">Đang tải…</p>
            </div>
        </div>
    </main>

    <script th:src="@{/js/sinh-vien-lich-su-chi-tiet.js}"></script>
</body>
</html>
