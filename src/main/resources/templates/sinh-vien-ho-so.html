<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Sinh Viên - ThiTracNghiem</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a th:href="@{/}" class="sidebar-logo">
                <i class="fas fa-graduation-cap"></i>
                <span>ThiTracNghiem</span>
            </a>
            <button type="button" class="sidebar-close" id="sidebarClose" aria-label="Đóng menu">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <nav class="sidebar-menu">
            <div class="menu-section">
                <span class="menu-label">QUẢN LÝ</span>
                <a th:href="@{/dashboard/sinh-vien}" class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>Trang Chủ</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="fas fa-file-alt"></i>
                    <span>Lịch Sử Thi</span>
                </a>
                <a th:href="@{/dashboard/sinh-vien/phong-thi}" class="menu-item">
                    <i class="fas fa-door-open"></i>
                    <span>Phòng thi</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="fas fa-book"></i>
                    <span>Môn Học</span>
                </a>
            </div>

            <div class="menu-section">
                <span class="menu-label">TÀI KHOẢN</span>
                <a th:href="@{/dashboard/sinh-vien/ho-so}" class="menu-item active">
                    <i class="fas fa-user"></i>
                    <span>Hồ Sơ</span>
                </a>
                <a href="#" class="menu-item logout-btn" id="btnLogout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng Xuất</span>
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <div class="header-left">
                <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Mở menu">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Quản lý tài khoản cá nhân</h1>
            </div>

            <div class="header-right">
                <div class="user-info" id="userInfo">
                    <div class="user-info-text">
                        <span class="user-name">Xin chào, <strong id="displayName">—</strong></span>
                        <span class="user-role-badge" id="displayRole">Sinh viên</span>
                    </div>
                    <div class="user-avatar">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                </div>
            </div>
        </header>

        <div class="dashboard-content profile-page-content">
            <div class="dashboard-card profile-card">
                <div class="card-header">
                    <h3><i class="fas fa-id-card"></i> Thông tin cá nhân</h3>
                </div>
                <div class="card-body">
                    <div id="msgProfile" class="form-message" role="status" hidden></div>
                    <form id="formProfile" class="profile-form">
                        <div class="form-grid">
                            <div class="form-field form-field-span2">
                                <label for="maNguoiDung">Mã người dùng</label>
                                <input type="text" id="maNguoiDung" name="maNguoiDung" readonly autocomplete="off">
                            </div>
                            <div class="form-field">
                                <label for="ho">Họ</label>
                                <input type="text" id="ho" name="ho" autocomplete="family-name" required>
                            </div>
                            <div class="form-field">
                                <label for="ten">Tên</label>
                                <input type="text" id="ten" name="ten" autocomplete="given-name" required>
                            </div>
                            <div class="form-field form-field-span2">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" autocomplete="email" required>
                            </div>
                            <div class="form-field form-field-span2">
                                <label for="soDienThoai">Số điện thoại</label>
                                <input type="tel" id="soDienThoai" name="soDienThoai" autocomplete="tel" required>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="btnSaveProfile">
                                <i class="fas fa-save"></i> Lưu thông tin
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="dashboard-card profile-card">
                <div class="card-header">
                    <h3><i class="fas fa-key"></i> Đổi mật khẩu</h3>
                </div>
                <div class="card-body">
                    <div id="msgPassword" class="form-message" role="status" hidden></div>
                    <form id="formPassword" class="profile-form">
                        <div class="form-grid">
                            <div class="form-field form-field-span2">
                                <label for="matKhauCu">Mật khẩu hiện tại</label>
                                <input type="password" id="matKhauCu" name="matKhauCu" autocomplete="current-password" required>
                            </div>
                            <div class="form-field form-field-span2">
                                <label for="matKhauMoi">Mật khẩu mới</label>
                                <input type="password" id="matKhauMoi" name="matKhauMoi" autocomplete="new-password" required minlength="6">
                            </div>
                            <div class="form-field form-field-span2">
                                <label for="matKhauMoi2">Nhập lại mật khẩu mới</label>
                                <input type="password" id="matKhauMoi2" name="matKhauMoi2" autocomplete="new-password" required minlength="6">
                            </div>
                        </div>
                        <p class="form-hint">Mật khẩu mới tối thiểu 6 ký tự.</p>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="btnSavePassword">
                                <i class="fas fa-lock"></i> Đổi mật khẩu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script th:src="@{/js/sinh-vien-ho-so.js}"></script>
</body>
</html>
