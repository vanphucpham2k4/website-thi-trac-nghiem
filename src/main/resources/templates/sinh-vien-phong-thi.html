<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp/Phòng Thi - ThiTracNghiem</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .lop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }
        .lop-card {
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            padding: 20px 22px;
            cursor: pointer;
            transition: box-shadow 0.2s, border-color 0.2s;
            background: #fff;
            text-align: left;
        }
        .lop-card:hover {
            box-shadow: 0 10px 28px rgba(102, 126, 234, 0.18);
            border-color: #a3bffa;
        }
        .lop-card-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #2d3748;
            margin: 0 0 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lop-card-title i { color: #667eea; }
        .lop-card-meta {
            font-size: 0.88rem;
            color: #718096;
            margin: 0;
            line-height: 1.45;
        }
        .lop-card-meta strong { color: #4a5568; font-weight: 600; }
        /* Có đề mới xuất bản — nhấp nháy 2 nhịp (realtime polling) */
        .lop-card.lop-card-flash {
            animation: lopCardFlashTwice 1.35s ease;
        }
        @keyframes lopCardFlashTwice {
            0%, 100% { box-shadow: none; transform: scale(1); border-color: #e2e8f0; }
            15% { box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.45); transform: scale(1.02); border-color: #a3bffa; }
            30% { box-shadow: none; transform: scale(1); border-color: #e2e8f0; }
            45% { box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.45); transform: scale(1.02); border-color: #a3bffa; }
            60% { box-shadow: none; transform: scale(1); }
        }
        #toastContainer {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            display: flex; align-items: center; gap: 12px; padding: 14px 18px;
            border-radius: 12px; min-width: 280px; max-width: 380px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); font-size: 0.9rem; font-weight: 500;
        }
        .toast-error { background: #fff5f5; color: #9b2c2c; border-left: 4px solid #f56565; }
        .empty-state { text-align: center; padding: 2.5rem 1rem; color: #718096; }
        .empty-state i { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a th:href="@{/}" class="sidebar-logo">
                <i class="fas fa-graduation-cap"></i>
                <span>ThiTracNghiem</span>
            </a>
            <button type="button" class="sidebar-close" id="sidebarClose" aria-label="Đóng menu">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <nav class="sidebar-menu">
            <div class="menu-section">
                <span class="menu-label">MENU CHÍNH</span>
                <a th:href="@{/dashboard/sinh-vien}" class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>Trang Chủ</span>
                </a>
                <a th:href="@{/dashboard/sinh-vien/lich-su-thi}" class="menu-item">
                    <i class="fas fa-file-alt"></i>
                    <span>Lịch Sử Thi</span>
                </a>
                <a th:href="@{/dashboard/sinh-vien/phong-thi}" class="menu-item active">
                    <i class="fas fa-door-open"></i>
                    <span>Lớp/Phòng Thi</span>
                </a>
                <a th:href="@{/dashboard/sinh-vien/doi-thuong}" class="menu-item">
                    <i class="fas fa-gift"></i>
                    <span>Đổi Thưởng</span>
                </a>
            </div>

            <div class="menu-section">
                <span class="menu-label">TÀI KHOẢN</span>
                <a th:href="@{/dashboard/sinh-vien/ho-so}" class="menu-item">
                    <i class="fas fa-user"></i>
                    <span>Hồ Sơ</span>
                </a>
                <a href="#" class="menu-item logout-btn" id="btnLogout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng Xuất</span>
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <div class="header-left">
                <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Mở menu">
                    <i class="fas fa-bars"></i>
                </button>
                <h1><i class="fas fa-door-open" style="color:#667eea;margin-right:10px;"></i>Lớp/Phòng Thi</h1>
            </div>

            <div class="header-right">
                <div class="user-info" id="userInfo">
                    <div class="user-info-text">
                        <span class="user-name">Xin chào, <strong id="displayName">—</strong></span>
                        <span class="user-role-badge" id="displayRole">Sinh viên</span>
                    </div>
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="dashboard-card">
                <div class="card-header">
                    <h3><i class="fas fa-school"></i> Các lớp bạn tham gia</h3>
                </div>
                <div class="card-body">
                    <p style="margin:0 0 18px;font-size:0.9rem;color:#718096;line-height:1.5;">
                        Hiển thị các lớp do giáo viên tạo và đã thêm bạn làm thành viên. Chọn một lớp để xem đề thi (sẽ bổ sung sau).
                    </p>
                    <div id="lopGridWrap">
                        <div class="empty-state" id="lopGridLoading">
                            <i class="fas fa-spinner fa-spin"></i><br>Đang tải…
                        </div>
                        <div class="lop-grid" id="lopGrid" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer"></div>
    <script th:src="@{/js/sinh-vien-phong-thi.js}"></script>
</body>
</html>
