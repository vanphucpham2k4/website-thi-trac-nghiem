<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tham gia đề thi - ThiTracNghiem</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .thi-mo-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .thi-mo-card {
            background: #fff;
            border-radius: 16px;
            max-width: 480px;
            width: 100%;
            padding: 28px 26px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .thi-mo-card h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #2d3748;
            margin: 0 0 8px;
            line-height: 1.35;
        }
        .thi-mo-meta {
            font-size: 0.88rem;
            color: #718096;
            line-height: 1.55;
            margin: 0 0 18px;
        }
        .thi-mo-meta strong { color: #4a5568; font-weight: 600; }
        .thi-mo-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
        .thi-mo-actions .btn-primary-custom {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 18px; border: none; border-radius: 10px; font-family: inherit;
            font-weight: 600; font-size: 0.95rem; cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
            text-decoration: none; transition: opacity 0.2s;
        }
        .thi-mo-actions .btn-primary-custom:hover { opacity: 0.92; }
        .thi-mo-actions .btn-secondary-line {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 11px 18px; border-radius: 10px; font-family: inherit; font-weight: 500;
            font-size: 0.9rem; cursor: pointer; background: #fff; color: #4a5568;
            border: 1.5px solid #e2e8f0; text-decoration: none;
        }
        .thi-mo-err {
            background: #fff5f5; color: #9b2c2c; padding: 14px; border-radius: 10px;
            font-size: 0.9rem; border-left: 4px solid #f56565;
        }
        .thi-mo-loading { text-align: center; color: #718096; padding: 20px; }
        .thi-mo-note { font-size: 0.8rem; color: #a0aec0; margin-top: 14px; line-height: 1.45; }
        .thi-mo-btn-start {
            width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px 18px; border: none; border-radius: 10px; font-family: inherit;
            font-weight: 600; font-size: 0.95rem; cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
        }
        .thi-mo-btn-start:hover { opacity: 0.93; }
        .thi-mo-btn-start:disabled { opacity: 0.55; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="thi-mo-wrap">
        <div class="thi-mo-card">
            <input type="hidden" id="maTruyCapHidden" th:value="${maTruyCap}">
            <div id="thiMoLoading" class="thi-mo-loading">
                <i class="fas fa-spinner fa-spin" style="font-size:1.5rem;color:#667eea;"></i>
                <p style="margin-top:10px;">Đang tải thông tin đề thi…</p>
            </div>
            <div id="thiMoError" style="display:none;"></div>
            <div id="thiMoContent" style="display:none;">
                <h1 id="thiMoTenDe">—</h1>
                <p class="thi-mo-meta" id="thiMoMeta"></p>
                <div id="thiMoFormWrap">
                    <label for="hoTenAnDanh" style="display:block;font-weight:600;margin-bottom:8px;color:#4a5568;font-size:0.9rem;">
                        Họ và tên <span style="color:#e53e3e">*</span>
                    </label>
                    <input type="text" id="hoTenAnDanh" maxlength="200" autocomplete="name" placeholder="Nhập họ và tên đầy đủ"
                           style="width:100%;box-sizing:border-box;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:0.95rem;margin-bottom:14px;">
                    <button type="button" id="btnBatDauThiMo" class="thi-mo-btn-start">
                        <i class="fas fa-play"></i> Bắt đầu thi
                    </button>
                    <p class="thi-mo-note">
                        Không cần đăng nhập. Phiên làm bài ẩn danh; sau khi nộp bạn chỉ xem kết quả và chi tiết đáp án trên các trang tiếp theo (không vào được khu vực sinh viên đăng nhập).
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/thi-mo-cong-khai.js}"></script>
</body>
</html>
