<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm bài thi - ThiTracNghiem</title>
    <link rel="stylesheet" th:href="@{/css/lam-bai-thi.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="lam-bai-thi-page">
    <header class="exam-header">
        <div class="exam-header-left">
            <a th:href="@{/dashboard/sinh-vien}" class="exam-back">
                <i class="fas fa-arrow-left"></i>
                <span>Quay lại</span>
            </a>
            <div class="exam-title-wrap">
                <h1 id="examTenDe">Làm bài thi</h1>
                <p class="exam-sub" id="examMeta"></p>
            </div>
        </div>
        <div class="exam-header-right">
            <div class="exam-timer" title="Thời gian còn lại">
                <i class="fas fa-clock"></i>
                <span id="examTimerDisplay">—</span>
            </div>
            <button type="button" class="btn-nop-bai" id="btnNopBai">
                <i class="fas fa-paper-plane"></i>
                Nộp bài
            </button>
        </div>
    </header>

    <main class="exam-main">
        <p class="exam-loading" id="examLoading">Đang tải đề thi…</p>
        <div id="examCauHoiList" aria-live="polite"></div>
    </main>

    <script th:src="@{/js/lam-bai-thi.js}"></script>
</body>
</html>
