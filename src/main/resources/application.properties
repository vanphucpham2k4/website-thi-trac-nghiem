spring.application.name=webthitracnghiem

# XAMPP MySQL / MariaDB — database đã tạo trong phpMyAdmin: webthitracnghiem
spring.datasource.url=jdbc:mysql://localhost:3306/webthitracnghiem?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Khai báo dialect rõ ràng — tránh lỗi "Unable to determine Dialect without JDBC metadata"
# khi MySQL chưa chạy hoặc Hibernate chưa đọc được metadata từ JDBC.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Giữ đúng tên cột trong @Column / @JoinColumn (vd. IDmon_hoc) thay vì ép chữ thường
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ===============================
# Cấu hình Thymeleaf cho View
# ===============================
# Bật cache cho Thymeleaf (true khi production, false khi development)
spring.thymeleaf.cache=false
# Chế độ view (HTML5, XHTML, XML)
spring.thymeleaf.mode=HTML
# Tiền tố đường dẫn template (đường dẫn tới thư mục templates)
spring.thymeleaf.prefix=classpath:/templates/
# Hậu tố file template (.html)
spring.thymeleaf.suffix=.html
# Mã hóa ký tự UTF-8 để hiển thị tiếng Việt đúng
spring.thymeleaf.encoding=UTF-8
# Tắt check template exists để tránh lỗi khi development nhanh
spring.thymeleaf.check-template-location=false

# ===============================
# Cấu hình Static Resources
# ===============================
# Đường dẫn tới thư mục chứa CSS, JS, images
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true

# ===============================
# Cấu hình JWT — thời hạn token 30 phút
# ===============================
# Khóa bí mật ký JWT (tối thiểu 256-bit, nên đổi sang chuỗi ngẫu nhiên dài khi production)
jwt.secret=website-thi-trac-nghiem-2024-secret-key-very-long-and-secure-minimum-256-bits!!
# Thời gian hiệu lực token: 30 phút = 1800000 ms
jwt.expiration-ms=1800000

# ===============================
# Đổi thưởng (sinh viên)
# diem_thuong_tich_luy: đọc trực tiếp từ DB khi xem trang; chỉ đồng bộ từ ket_qua_thi sau khi nộp bài (SinhVienThiService).
# true = mỗi lần khởi động app ghi đè điểm/lượt cho mọi sinh viên từ DB nguồn (không dùng nếu chỉnh tay điểm trong phpMyAdmin).
# ===============================
doi-thuong.dong-bo-toan-bo-sinh-vien-khi-khoi-dong=false

# ===============================
# Cấu hình upload file (import đề thi PDF/DOCX)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
